<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather forecast</title>
    <link rel="stylesheet" href="src/styles/style.css">
    <script src="https://kit.fontawesome.com/385888c5f9.js" crossorigin="anonymous"></script>
</head>
<body>
    <div id="container">
        <form id="search">
            <i class="fa-solid fa-location-dot"></i>

            <input type="search" name="city_name" id="city_name" placeholder="Buscar cidade">

            <button type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>

    <div id="weather" class="">
        <h1 id="tittle">Horizontina, RS</h1>

        <div id="infos">
            <div id="temp">
                <img id="temp_img" src="" alt="">

                <div>
                    <p id="temp_value">
                        
                    </p>
                    <p id="temp_description">
                        Ensolarado
                    </p>
                </div>
            </div>
            <div id="other_infos">
                <div class="info">
                    <i class="fa-solid fa-temperature-arrow-up" id="temp_max_icon"></i>
                    <div>
                        <h2>Temp, max</h2>
                        <p id="temp_max">
                            32 <sup>C°</sup>
                        </p>
                    </div>
                </div>


                <div class="info">
                    <i class="fa-solid fa-temperature-arrow-down" id="temp_min_icon"></i>
                    <div>
                        <h2>Temp, min</h2>
                        <p id="temp_min">
                            32 <sup>C°</sup>
                        </p>
                    </div>
                </div>

                
                <div class="info">
                    <i class="fa-solid fa-droplet" id="humidity_icon"></i>
                    <div>
                        <h2>Humidade</h2>
                        <p id="humidity">
                            50%
                        </p>
                    </div>
                </div>

                <div class="info">
                    <i class="fa-solid fa-wind" id="wind_icon"></i>
                    <div>
                        <h2>Vento</h2>
                        <p id="wind">
                            50 km/h
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <div id="alert">
        
    </div>
    </div>
    <script src="src/javascript/script.js"></script>
</body>
</html>
